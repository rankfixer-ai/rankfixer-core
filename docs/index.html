<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankFixer Engine — Diagnostic Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 560px; }
        h1 { font-family: 'Fraunces', Georgia, serif; font-size: 28px; color: #1a1714; margin-bottom: 12px; }
        .status { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
        .status-production { background: #dcfce7; color: #166534; }
        p { color: #6b6762; font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
        .link { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #c8490a; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="status status-production">Production-Parity Mode</div>
        <h1>RankFixer Engine</h1>
        <p>Autonomous site audit and state reconciliation engine.</p>
        <p>Classify → Detect → Reconcile → Verify — at scale.</p>
        <a class="link" href="https://github.com/rankfixer-ai/rankfixer-core">View on GitHub</a>
    </div>
</body>
</html>
